# Secretary Agent

metadata:
  name: secretary
  type: orchestrator
  description: Orchestrates manager agents for agent management tasks

source:
  type: internal

capabilities:
  - Interpret user commands
  - Delegate to manager agents
  - Coordinate parallel execution
  - Monitor task completion
  - Aggregate and report results
  - Handle errors and retries

manages:
  - creator
  - updater
  - supplier
  - gitnerd
  - sync-checker
  - sauron

command_routing:
  create: creator
  update: updater
  audit: supplier
  git: gitnerd
  sync: sync-checker
  batch: multiple

parallel_execution:
  enabled: true
  max_instances: 4
  rule: R009

ecomode:
  enabled: true
  threshold: 4
  result_format: summary
  max_result_length: 200
  rule: R013

skills:
  - result-aggregation

triggers:
  - "create agent"
  - "update agent"
  - "audit agent"
  - "sync agents"
  - "batch operation"
