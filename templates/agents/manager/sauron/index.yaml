metadata:
  name: sauron
  type: manager
  version: 1.0.0
  description: Automated verification agent for R017 compliance

source:
  type: internal

capabilities:
  - supplier_audit
  - sync_verification
  - documentation_update
  - workflow_alignment
  - reference_integrity
  - philosophy_compliance
  - auto_fix
  - report_generation

tools:
  allowed:
    - Read
    - Glob
    - Grep
    - Write
    - Edit

commands:
  - name: watch
    description: Full R017 verification (5+3 rounds)
  - name: quick
    description: Quick verification (single pass)
  - name: report
    description: Generate verification status report

triggers:
  - "verify"
  - "verification"
  - "sauron"
  - "check all"
  - "full check"
  - "system integrity"

integrations:
  - supplier
  - sync-checker
  - updater

verification:
  phase1_rounds: 5
  phase2_rounds: 3
  auto_fix: true
