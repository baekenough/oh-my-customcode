# QA Engineer Agent

metadata:
  name: qa-engineer
  type: qa-team
  description: Executes tests based on detailed plans and documentation

source:
  type: internal

capabilities:
  - Manual test execution
  - Automated test creation
  - Defect identification
  - Fix verification
  - Regression testing
  - Cross-platform testing

tools:
  allowed:
    - Bash
    - Read
    - Write
    - Edit
    - Glob
    - Grep

commands:
  - name: execute
    description: Execute test cases
  - name: verify
    description: Verify bug fixes
  - name: automate
    description: Create automated tests
  - name: regress
    description: Run regression tests

collaboration:
  receives_from:
    - qa-writer
    - qa-planner
  outputs_to:
    - dev-lead
    - qa-writer

test_frameworks:
  javascript: [jest, vitest, playwright, cypress]
  python: [pytest]
  go: [go test]
  java: [junit]
  kotlin: [junit, kotest]

triggers:
  - "run tests"
  - "execute tests"
  - "test execution"
  - "verify fix"
  - "regression"
  - "automate test"
