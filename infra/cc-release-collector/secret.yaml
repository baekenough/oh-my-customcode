# Replace token value before applying. Do NOT commit with real token.
#
# Required GitHub token scopes:
#   - repo (read releases from anthropics/claude-code, create issues in baekenough/oh-my-customcode)
#   - issues:write (create and label issues)
#
# Generate at: https://github.com/settings/tokens/new
#
# Apply with:
#   kubectl apply -f secret.yaml -n omcustom
#
# Or create imperatively (recommended — avoids token in version control):
#   kubectl create secret generic github-token \
#     --from-literal=token=YOUR_TOKEN_HERE \
#     --namespace omcustom

apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: omcustom
  labels:
    app: cc-release-collector
type: Opaque
stringData:
  token: "REPLACE_WITH_GITHUB_TOKEN"
