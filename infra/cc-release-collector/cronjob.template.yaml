apiVersion: batch/v1
kind: CronJob
metadata:
  name: cc-release-collector
  namespace: ${K8S_NAMESPACE}
  labels:
    app: cc-release-collector
    component: release-watcher
spec:
  schedule: "${CRON_SCHEDULE}"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: cc-release-collector
            component: release-watcher
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: collector
              image: ${IMAGE_FULL}
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-token
                      key: token
                - name: REPO
                  value: "${TARGET_REPO}"
                - name: MIN_VERSION
                  value: "${MIN_VERSION}"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: gh-config
                  mountPath: /home/collector
          volumes:
            - name: tmp
              emptyDir: {}
            - name: gh-config
              emptyDir: {}
