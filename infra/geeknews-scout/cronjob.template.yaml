apiVersion: batch/v1
kind: CronJob
metadata:
  name: geeknews-scout
  namespace: ${K8S_NAMESPACE}
  labels:
    app: geeknews-scout
    component: feed-watcher
spec:
  schedule: "${CRON_SCHEDULE}"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: geeknews-scout
            component: feed-watcher
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: scout
              image: ${IMAGE_FULL}
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-token
                      key: token
                - name: REPO
                  value: "${TARGET_REPO}"
                - name: FEED_URL
                  value: "${FEED_URL}"
                - name: KEYWORDS
                  value: "${KEYWORDS}"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: home
                  mountPath: /home/scout
          volumes:
            - name: tmp
              emptyDir: {}
            - name: home
              emptyDir: {}
