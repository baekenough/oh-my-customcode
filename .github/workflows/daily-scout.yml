name: daily-scout

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "이슈를 만들지 않고 로그만 출력"
      min_score:
        type: string
        default: ""
        description: "관련도 임계값(0-100). 비우면 기본 60"

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Cache Bun dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Run scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SCOUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          SCOUT_MIN_SCORE: ${{ github.event.inputs.min_score }}
          SCOUT_MAX_ISSUES: "5"
        run: bun run .github/scripts/scout-feed.ts

      - name: Summary
        if: always()
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "## daily-scout run complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Completed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- dry_run: ${DRY_RUN}" >> $GITHUB_STEP_SUMMARY
