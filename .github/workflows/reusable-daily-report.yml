name: Reusable Daily Issue Report

on:
  workflow_call:
    inputs:
      repositories:
        type: string
        required: true
        description: 'Comma-separated list of repositories (e.g. owner/repo1,owner/repo2)'
      report_email:
        type: string
        required: true
        description: 'Email address to send report to'
      gmail_user:
        type: string
        required: false
        default: 'baekenough@gmail.com'
        description: 'Gmail sender address'
    secrets:
      GMAIL_APP_PASSWORD:
        required: true
  push:
    paths:
      - '.github/workflows/reusable-daily-report.yml'

jobs:
  push-guard:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Reusable workflow file updated. No direct execution needed."

  report:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout oh-my-customcode (scripts only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: baekenough/oh-my-customcode
          ref: develop
          sparse-checkout: |
            .github/scripts
            package.json
            bun.lock
          sparse-checkout-cone-mode: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --production

      - name: Send daily issue report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ inputs.gmail_user }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL: ${{ inputs.report_email }}
          REPOSITORIES: ${{ inputs.repositories }}
        run: bun run .github/scripts/send-report.ts

      - name: Summary
        if: always()
        run: |
          echo "## Daily Issue Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repositories: ${{ inputs.repositories }}" >> $GITHUB_STEP_SUMMARY
          echo "Email: ${{ inputs.report_email }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report sent at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
