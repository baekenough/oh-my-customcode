name: Sync Check

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'scripts/verify-sync.sh'
  schedule:
    # Run daily at 04:00 KST (19:00 UTC previous day)
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      baekgom_ref:
        description: 'baekgom-agents branch/tag to compare against'
        required: false
        default: 'master'

permissions:
  contents: read
  issues: write

jobs:
  sync-check:
    name: Verify Template Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout oh-my-customcode
        uses: actions/checkout@v4
        with:
          path: oh-my-customcode

      - name: Checkout baekgom-agents (private)
        uses: actions/checkout@v4
        with:
          repository: baekenough/baekgom-agents
          token: ${{ secrets.OMCUSTOM_MASTER }}
          ref: ${{ github.event.inputs.baekgom_ref || 'master' }}
          path: baekgom-agents

      - name: Run sync verification
        id: verify
        continue-on-error: true
        working-directory: oh-my-customcode
        run: |
          chmod +x scripts/verify-sync.sh
          ./scripts/verify-sync.sh ../baekgom-agents 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee "$RUNNER_TEMP/sync-output.txt"

      - name: Close drift issue on sync success
        if: steps.verify.outcome == 'success'
        working-directory: oh-my-customcode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "sync-drift" --state open --json number --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            gh issue close "$EXISTING" --comment "Sync drift resolved. Templates are now in sync with baekgom-agents."
          fi

      - name: Create summary on success
        if: steps.verify.outcome == 'success'
        run: |
          echo "## ✅ Sync Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Templates are in sync with [baekgom-agents](https://github.com/baekenough/baekgom-agents)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Agents | ✅ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "| Skills | ✅ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "| Rules | ✅ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "| Hooks | ✅ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "| Contexts | ✅ Synced |" >> $GITHUB_STEP_SUMMARY
          echo "| Guides | ✅ Synced |" >> $GITHUB_STEP_SUMMARY

      - name: Create or update drift issue
        if: steps.verify.outcome == 'failure'
        working-directory: oh-my-customcode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_OUTPUT=$(cat "$RUNNER_TEMP/sync-output.txt")
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Ensure sync-drift label exists
          gh label create "sync-drift" --color "E4E669" --description "Template sync drift detected" 2>/dev/null || true

          # Check for existing open drift issue
          EXISTING=$(gh issue list --label "sync-drift" --state open --json number --jq '.[0].number // empty')

          if [[ -n "$EXISTING" ]]; then
            cat > "$RUNNER_TEMP/issue-body.md" <<__BODY__
          ### Drift still present - $DATE

          \`\`\`
          $SYNC_OUTPUT
          \`\`\`

          [Workflow run]($RUN_URL)
          __BODY__
            gh issue comment "$EXISTING" --body-file "$RUNNER_TEMP/issue-body.md"
            echo "Updated existing issue #$EXISTING"
          else
            cat > "$RUNNER_TEMP/issue-body.md" <<__BODY__
          ## Template Sync Drift Detected

          Templates in \`oh-my-customcode\` have drifted from \`baekgom-agents\` source repository.

          ### Verification Output

          \`\`\`
          $SYNC_OUTPUT
          \`\`\`

          ### Resolution

          1. Run sync locally: \`./sync.sh\`
          2. Review changes and commit
          3. Push to trigger re-verification

          ---
          *Auto-generated by [Sync Check workflow]($RUN_URL) on $DATE*
          __BODY__
            ISSUE_URL=$(gh issue create \
              --title "Sync drift detected: templates out of sync with baekgom-agents" \
              --label "sync-drift" \
              --body-file "$RUNNER_TEMP/issue-body.md")
            echo "Created new issue: $ISSUE_URL"
          fi

      - name: Create summary on drift
        if: steps.verify.outcome == 'failure'
        run: |
          echo "## ⚠️ Sync Drift Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Templates have drifted from [baekgom-agents](https://github.com/baekenough/baekgom-agents)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A GitHub issue has been created/updated with the drift details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Action Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Run \`./sync.sh\` to sync templates" >> $GITHUB_STEP_SUMMARY
          echo "2. Commit and push the changes" >> $GITHUB_STEP_SUMMARY
