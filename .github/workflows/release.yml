name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Build
        run: bun run build

  publish:
    name: Publish
    needs: [test]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Check if version already exists on npm
      - name: Check npm version
        id: npm_check
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if this version already exists on npm
          if npm view oh-my-customcode@$VERSION version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION already exists on npm, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Publish to npm (skip if already exists)
      - name: Publish to npm
        if: steps.npm_check.outputs.exists == 'false'
        run: |
          npm publish --provenance --access public 2>&1 || {
            EXIT_CODE=$?
            # Check if failure is due to version already existing (race condition with local publish)
            if npm view oh-my-customcode@${{ steps.npm_check.outputs.version }} version 2>/dev/null; then
              echo "::notice::Version ${{ steps.npm_check.outputs.version }} was published externally (race condition). Continuing."
            else
              exit $EXIT_CODE
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Re-configure for GitHub Packages
      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@baekenough'

      # Check if version already exists on GitHub Packages
      - name: Check GitHub Packages version
        id: ghp_check
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Check if this version already exists on GitHub Packages
          if npm view @baekenough/oh-my-customcode@$VERSION version --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION already exists on GitHub Packages, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to GitHub Packages (skip if already exists)
      - name: Publish to GitHub Packages
        if: steps.ghp_check.outputs.exists == 'false'
        run: |
          # Update package name for GitHub Packages (scoped)
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@baekenough/oh-my-customcode';
            pkg.publishConfig = {
              registry: 'https://npm.pkg.github.com',
              access: 'public'
            };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm publish 2>&1 || {
            EXIT_CODE=$?
            # Check if failure is due to version already existing (race condition with local publish)
            VERSION=${GITHUB_REF#refs/tags/v}
            if npm view @baekenough/oh-my-customcode@$VERSION version --registry=https://npm.pkg.github.com 2>/dev/null; then
              echo "::notice::Version $VERSION was published externally (race condition). Continuing."
            else
              exit $EXIT_CODE
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Restore package.json (only if we modified it)
      - name: Restore package.json
        if: steps.ghp_check.outputs.exists == 'false'
        run: git checkout package.json

      # Extract changelog for this version (with graceful fallback)
      - name: Extract Release Notes
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check for CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found. Will use auto-generated release notes."
            echo "notes=" >> $GITHUB_OUTPUT
            echo "has_changelog=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract changelog section for this version
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for version ${VERSION}."
            echo "::warning::Will use auto-generated release notes. Consider adding a '## [${VERSION}]' section to CHANGELOG.md."
            echo "notes=" >> $GITHUB_OUTPUT
            echo "has_changelog=false" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_changelog=true" >> $GITHUB_OUTPUT
            echo "::notice::Found changelog entry for v${VERSION}"
          fi

      # Create GitHub Release with changelog or auto-generated notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes || '_Auto-generated release notes (CHANGELOG.md entry missing)_' }}

            ---

            ### Installation

            ```bash
            # npm
            npm install oh-my-customcode@${{ steps.changelog.outputs.version }}

            # or use npx
            npx oh-my-customcode@${{ steps.changelog.outputs.version }} init
            ```

            ### Links
            - [npm package](https://www.npmjs.com/package/oh-my-customcode/v/${{ steps.changelog.outputs.version }})
            - [GitHub Package](https://github.com/baekenough/oh-my-customcode/pkgs/npm/oh-my-customcode)
          generate_release_notes: ${{ steps.changelog.outputs.has_changelog != 'true' }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup Release Branch
    needs: [publish]
    if: success()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Delete release branch
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Try both naming patterns
          for BRANCH in "release/v${VERSION}" "release/${VERSION}"; do
            echo "Checking branch: $BRANCH"
            if gh api "repos/${{ github.repository }}/git/refs/heads/${BRANCH}" --silent 2>/dev/null; then
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${BRANCH}" && \
                echo "✓ Deleted branch: $BRANCH" || \
                echo "⚠ Failed to delete branch: $BRANCH"
            else
              echo "Branch $BRANCH not found, skipping"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
