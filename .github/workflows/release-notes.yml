name: Release Notes Generator

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.3)"
        required: true
        type: string
      previous_tag:
        description: "Previous tag to compare (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for tag comparison

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.RELEASE_BOT }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          PREVIOUS_TAG: ${{ inputs.previous_tag }}
        run: |
          python .github/scripts/generate_release_notes.py "${{ steps.version.outputs.version }}" > release_notes.md
          cat release_notes.md

      - name: Create or update GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-v${{ steps.version.outputs.version }}
          path: release_notes.md

      - name: Comment summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "## 📝 Release Notes Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat release_notes.md >> $GITHUB_STEP_SUMMARY
