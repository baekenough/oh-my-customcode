name: Documentation Validator

on:
  push:
    branches: [develop, main]
    paths:
      - "README.md"
      - "README_ko.md"
      - "templates/**"
  pull_request:
    branches: [develop]
    paths:
      - "README.md"
      - "README_ko.md"
      - "templates/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-docs:
    runs-on: [self-hosted, nuc13]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Validate documentation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OH_MY_CUSTOMCODE }}
        run: bun run .github/scripts/validate-docs.ts > validation_result.md

      - name: Upload validation result
        uses: actions/upload-artifact@v6
        with:
          name: docs-validation-report
          path: validation_result.md

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('validation_result.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: result
            });

      - name: Check for errors
        run: |
          if grep -q "❌" validation_result.md; then
            echo "::warning::Documentation validation found errors - review the report"
            cat validation_result.md
          else
            echo "Documentation validation passed!"
            cat validation_result.md
          fi
