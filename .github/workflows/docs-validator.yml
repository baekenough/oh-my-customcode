name: Documentation Validator

on:
  push:
    branches: [develop, main]
    paths:
      - "README.md"
      - "README_ko.md"
      - "templates/**"
  pull_request:
    branches: [develop]
    paths:
      - "README.md"
      - "README_ko.md"
      - "templates/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-docs:
    runs-on: [self-hosted, nuc13]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate documentation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OH_MY_CUSTOMCODE }}
        run: bun run .github/scripts/validate-docs.ts > validation_result.md

      - name: Upload validation result
        uses: actions/upload-artifact@v7
        with:
          name: docs-validation-report
          path: validation_result.md

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('validation_result.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: result
            });

      - name: Check for errors
        run: |
          if grep -q "VALIDATION_STATUS: FAIL" validation_result.md; then
            echo "::error::Documentation validation found mismatches - review the report"
            exit 1
          else
            echo "Documentation validation passed!"
          fi

      - name: Create or update issue on validation failure
        id: create-issue
        if: always() && github.event_name == 'push'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('validation_result.md', 'utf8');

            // Check if there are errors or warnings
            const hasErrors = result.includes('❌');
            const hasWarnings = result.includes('⚠️');

            if (!hasErrors && !hasWarnings) {
              console.log('No issues found, skipping issue creation');
              return;
            }

            const title = 'docs: documentation validation found issues';
            const body = `## Documentation Validation Report\n\n` +
              `**Branch:** \`${context.ref}\`\n` +
              `**Commit:** ${context.sha.substring(0, 7)}\n` +
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n` +
              `---\n\n${result}`;

            // Search for existing open issue with same title
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated',
              per_page: 100
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['documentation', 'automated']
              });
              console.log(`Created new issue #${newIssue.number}`);
            }
