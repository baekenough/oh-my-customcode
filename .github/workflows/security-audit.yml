name: Security Audit

on:
  # Weekly audit every Monday at 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'
  # Also run on PRs to catch new vulnerabilities
  pull_request:
    branches:
      - develop
      - release
  # Allow manual trigger
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: |
          # Run audit and fail on high/critical vulnerabilities
          bun pm audit --audit-level=high

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Security vulnerabilities detected. Please update dependencies."
          echo "Run 'bun pm audit' locally to see details."
