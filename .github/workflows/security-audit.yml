name: Security Audit

on:
  # Weekly audit every Monday at 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'
  # Also run on PRs to catch new vulnerabilities
  pull_request:
    branches:
      - develop
      - 'release/**'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: [self-hosted, nuc13]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: |
          # Generate package-lock.json for npm audit (bun uses bun.lock)
          npm i --package-lock-only --ignore-scripts 2>/dev/null || true
          # Run npm audit (fails on high/critical vulnerabilities)
          npm audit --audit-level=high

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Security vulnerabilities detected. Please update dependencies."
          echo "Run 'bun pm audit' locally to see details."
