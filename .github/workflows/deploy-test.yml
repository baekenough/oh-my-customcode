name: Deploy Test

on:
  pull_request:
    branches:
      - release

jobs:
  deploy-test:
    name: Deploy Test with Verdaccio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Start Verdaccio
        run: |
          npm install -g verdaccio
          verdaccio &
          sleep 5

      - name: Configure npm for Verdaccio
        run: |
          npm config set registry http://localhost:4873/
          # Create user for publishing (htpasswd disabled by default in verdaccio)
          npm config set //localhost:4873/:_authToken "test-token"

      - name: Publish to Verdaccio
        run: |
          npm publish --registry http://localhost:4873/

      - name: Test global install
        run: |
          npm install -g oh-my-customcode --registry http://localhost:4873/

      - name: Test omcc --version
        run: omcc --version

      - name: Test omcc --help
        run: omcc --help

      - name: Test omcc init (dry run)
        run: |
          # Create a test directory
          mkdir -p /tmp/test-project
          cd /tmp/test-project

          # Test init command (use echo to simulate user input or --help for now)
          omcc init --help || echo "Init help displayed"

      - name: Cleanup
        if: always()
        run: |
          pkill -f verdaccio || true
