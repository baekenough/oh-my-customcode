name: CI

on:
  pull_request:
    branches:
      - develop
      - release

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Check 100% coverage
        shell: bash
        run: |
          # Run coverage and capture output
          COVERAGE_OUTPUT=$(bun test --coverage 2>&1)
          echo "$COVERAGE_OUTPUT"

          # Extract coverage percentages and check for 100%
          # Bun outputs coverage in format: "All files | XX.XX% | XX.XX% | XX.XX%"
          if echo "$COVERAGE_OUTPUT" | grep -E "All files.*\|" | grep -qv "100"; then
            echo "::error::Coverage is not 100%. All coverage metrics must be 100%."
            exit 1
          fi

          echo "Coverage check passed: 100%"
