name: CI

on:
  pull_request:
    branches:
      - develop
      - 'release/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage and check threshold
        shell: bash
        run: |
          # Run coverage once and capture output
          COVERAGE_OUTPUT=$(bun test --coverage 2>&1)
          echo "$COVERAGE_OUTPUT"

          # Extract coverage percentages from "All files" line
          # Format: "All files | XX.XX | YY.YY |"
          COVERAGE_LINE=$(echo "$COVERAGE_OUTPUT" | grep -E "All files.*\|")
          echo "Coverage line: $COVERAGE_LINE"

          # Extract function and line coverage percentages
          FUNC_COV=$(echo "$COVERAGE_LINE" | awk -F'|' '{print $2}' | tr -d ' ')
          LINE_COV=$(echo "$COVERAGE_LINE" | awk -F'|' '{print $3}' | tr -d ' ')

          echo "Function coverage: $FUNC_COV%"
          echo "Line coverage: $LINE_COV%"

          # Check if coverage is >= 97%
          # Using awk for floating point comparison
          THRESHOLD=97

          FUNC_OK=$(echo "$FUNC_COV $THRESHOLD" | awk '{print ($1 >= $2) ? "1" : "0"}')
          LINE_OK=$(echo "$LINE_COV $THRESHOLD" | awk '{print ($1 >= $2) ? "1" : "0"}')

          if [ "$FUNC_OK" != "1" ] || [ "$LINE_OK" != "1" ]; then
            echo "::error::Coverage below threshold. Function: $FUNC_COV%, Line: $LINE_COV% (required: >= $THRESHOLD%)"
            exit 1
          fi

          echo "Coverage check passed: Function $FUNC_COV%, Line $LINE_COV% (threshold: $THRESHOLD%)"
