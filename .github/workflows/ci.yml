name: CI

on:
  pull_request:
    branches:
      - develop
      - 'release/**'

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, nuc13]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage and check threshold
        shell: bash
        run: |
          # Run coverage: tee shows output in real-time AND saves to file
          set +e
          rm -f /tmp/coverage-output.txt
          bun test --coverage 2>&1 | tee /tmp/coverage-output.txt
          # PIPESTATUS is bash-specific (requires shell: bash above)
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          COVERAGE_OUTPUT=$(cat /tmp/coverage-output.txt)

          # Workaround: bun test --coverage may exit non-zero even when tests pass
          # This heuristic checks actual test results in output (fragile if bun changes output format)
          # TODO(bun-update): Re-evaluate after bun stable release (currently using latest)
          if [ $TEST_EXIT -ne 0 ]; then
            if echo "$COVERAGE_OUTPUT" | grep -qE "[0-9]+ pass" && ! echo "$COVERAGE_OUTPUT" | grep -qE "[0-9]+ fail"; then
              echo "::warning::bun test exited with $TEST_EXIT but tests passed (known bun coverage quirk). Continuing..."
            else
              echo "::error::Tests failed with exit code $TEST_EXIT"
              exit 1
            fi
          fi

          # Extract coverage percentages from "All files" line
          # Format: "All files | XX.XX | YY.YY |"
          COVERAGE_LINE=$(echo "$COVERAGE_OUTPUT" | grep -E "All files.*\|")
          echo "Coverage line: $COVERAGE_LINE"

          # Extract function and line coverage percentages
          FUNC_COV=$(echo "$COVERAGE_LINE" | awk -F'|' '{print $2}' | tr -d ' ')
          LINE_COV=$(echo "$COVERAGE_LINE" | awk -F'|' '{print $3}' | tr -d ' ')

          echo "Function coverage: $FUNC_COV%"
          echo "Line coverage: $LINE_COV%"

          # Check if coverage is >= 97%
          THRESHOLD=97

          FUNC_OK=$(echo "$FUNC_COV $THRESHOLD" | awk '{print ($1 >= $2) ? "1" : "0"}')
          LINE_OK=$(echo "$LINE_COV $THRESHOLD" | awk '{print ($1 >= $2) ? "1" : "0"}')

          if [ "$FUNC_OK" != "1" ] || [ "$LINE_OK" != "1" ]; then
            echo "::error::Coverage below threshold. Function: $FUNC_COV%, Line: $LINE_COV% (required: >= $THRESHOLD%)"
            exit 1
          fi

          echo "Coverage check passed: Function $FUNC_COV%, Line $LINE_COV% (threshold: $THRESHOLD%)"

  rust-test:
    name: Rust Tests
    runs-on: [self-hosted, nuc13]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/ontology-rag

      - name: Run Rust tests
        working-directory: packages/ontology-rag
        run: cargo test --all
